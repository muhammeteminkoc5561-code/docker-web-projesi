name: DevOps Uretim Bandi (CI/CD)

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Kodlari Repodan Cek
        uses: actions/checkout@v3

      - name: 2. Docker Hub'a Gizli Kasadan Giris Yap
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: 3. Imaji Insa Et ve Buluta Firlat
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: emin3455/benim-web-imajim:latest
